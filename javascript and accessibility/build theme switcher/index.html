<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Build Theme Switcher</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header></header>
        <main>
            <button id="theme-switcher-button" aria-haspopup="true"
                aria-expanded="false" aria-controls="theme-dropdown">Switch
                Theme</button>

            <ul id="theme-dropdown" role="menu"
                aria-labelledby="theme-switcher-button" hidden>
                <li role="menuitem" id="theme-light">Light</li>
                <li role="menuitem" id="theme-dark">Dark</li>
            </ul>

            <div id="status-message" aria-live="polite"></div>
        </main>
        <footer></footer>
        <script src="script.js"></script>
    </body>
</html>
