<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Build a Lightbox Viewer</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header></header>
        <main>
            <div class="gallery">
                <img
                    src="https://cdn.freecodecamp.org/curriculum/labs/stonehenge-thumbnail.jpg"
                    class="gallery-item">
                <img
                    src="https://cdn.freecodecamp.org/curriculum/labs/storm-thumbnail.jpg"
                    class="gallery-item">
                <img
                    src="https://cdn.freecodecamp.org/curriculum/labs/trees-thumbnail.jpg"
                    class="gallery-item">
            </div>
            <div class="lightbox">
                <button id="close-btn"></button>
                <img alt="Lightbox Image" id="lightbox-image">
            </div>
        </main>
        <footer></footer>
        <script src="script.js"></script>
    </body>
</html>
