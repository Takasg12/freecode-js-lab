<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Build a Real Time Counter</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header></header>
        <main>
            <div class="container">
                <h1>Character Counter</h1>

                <!-- textarea with id "text-input" (required) -->
                <textarea id="text-input"
                    placeholder="Write somethin here" rows="10"
                    cols="40"></textarea>

                <!-- p element with id "char-count" (required) -->
                <p id="char-count">Character Count: 0/50</p>
            </div>
        </main>
        <footer></footer>
        <script src="script.js"></script>
    </body>
</html>
